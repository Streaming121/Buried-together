    ctx.fillText(player.mag + " / " + player.reserve, W / 2, 46);
    if (gameState === "playing" && player.weapons) {
      for (const box of hotbarBoxes()) {
        const slot = player.weapons[box.slot];
        const active = player.weaponSlot === box.slot;
        ctx.fillStyle = active ? "rgba(216,160,66,0.9)" : "rgba(35,31,27,0.82)";
        ctx.fillRect(box.x, box.y, box.w, box.h);
        ctx.strokeStyle = active ? "#ffe09a" : "#75654d";
        ctx.lineWidth = active ? 3 : 2;
        ctx.strokeRect(box.x, box.y, box.w, box.h);
        ctx.fillStyle = active ? "#2a1d08" : "#b8a982";
        ctx.font = "bold 8px Georgia";
        ctx.textAlign = "center";
        ctx.fillText(box.label, box.x + box.w / 2, box.y + 11);
        ctx.fillStyle = active ? "#1b1208" : "#e8d9b0";
        ctx.font = "bold 10px Georgia";
        ctx.fillText(slot ? slot.packing ? "IN MACHINE" : weaponDisplayName(slot.weapon, slot.packed, slot.packVariant) : "EMPTY", box.x + box.w / 2, box.y + 27);
        ctx.font = "7px Georgia";
        ctx.fillText(slot ? slot.packing ? "TAKE SOON" : slot.mag + "/" + slot.reserve : "--", box.x + box.w / 2, box.y + 38);
      }
      drawPowerupHUDBadges(ctx);
    }
    if (gameState === "playing") {
      const hbW = 160, hbH = 8;
      const hx = W / 2 - hbW / 2, hy = H - 30;
      ctx.fillStyle = "#3a1010";
      ctx.fillRect(hx, hy, hbW, hbH);
      ctx.fillStyle = player.health > 35 ? "#c83030" : "#ff4040";
      ctx.fillRect(hx, hy, hbW * Math.max(0, player.health / player.maxHealth), hbH);
      ctx.strokeStyle = "#1a0a0a";
      ctx.lineWidth = 1;
      ctx.strokeRect(hx, hy, hbW, hbH);
      if (player2) {
        ctx.fillStyle = "#9fe7ff";
        ctx.font = "bold 10px Georgia";
        ctx.textAlign = "center";
        ctx.fillText(isActorDowned(player2) ? "P2 DOWN - REVIVE" : "P2 " + Math.max(0, Math.ceil(player2.health || 0)) + "%", W / 2, hy - 18);
      }
      if (player.shieldBuilt) {
        const sy = hy - 13;
        ctx.fillStyle = "#10222a";
        ctx.fillRect(hx, sy, hbW, 6);
        ctx.fillStyle = "#5fc4df";
        ctx.fillRect(hx, sy, hbW * Math.max(0, player.shield / player.maxShield), 6);
        ctx.strokeStyle = "#071114";
        ctx.strokeRect(hx, sy, hbW, 6);
      } else if (player.shieldParts > 0) {
        ctx.fillStyle = "#9fe7ff";
        ctx.font = "bold 10px Georgia";
        ctx.textAlign = "center";
        const built = shieldBuiltCount();
        ctx.fillText("SHIELD " + built + "/" + player.shieldParts + " BUILT", W / 2, hy - 6);
      }
      if (!player.hydratorBuilt && player.hydratorParts > 0) {
        ctx.fillStyle = "#9fe7ff";
        ctx.font = "bold 10px Georgia";
        ctx.textAlign = "center";
        ctx.fillText("HYDRATOR " + hydratorBuiltCount() + "/" + player.hydratorParts + " BUILT", W / 2, hy + 10);
      }
    }
    if (player.reloading) {
      ctx.fillStyle = "#e8d9b0";
      ctx.font = "italic 11px Georgia";
      ctx.textAlign = "center";
      ctx.fillText("Reloading…", W / 2, activePowerupBadges().length ? 152 : 116);
    }
  }
  function drawControls(ctxAct) {
    if (gameState !== "playing") return;
    function drawStick(stick, baseColor, label) {
      ctx.save();
      ctx.globalAlpha = .55;
      ctx.fillStyle = "rgba(45,55,55,0.32)";
      ctx.beginPath();
      ctx.arc(stick.baseX, stick.baseY, 46, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(180,200,190,0.28)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(stick.baseX, stick.baseY, 46, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = .62;
      ctx.fillStyle = baseColor;
      ctx.beginPath();
      ctx.arc(stick.x, stick.y, 23, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(28,33,28,0.55)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(stick.x, stick.y, 23, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = .78;
      ctx.fillStyle = "rgba(230,220,180,0.7)";
      ctx.font = "bold 10px Georgia";
      ctx.textAlign = "center";
      ctx.fillText(label, stick.baseX, stick.baseY + 62);
      ctx.restore();
    }
    function drawRoundButton(btn, label, enabled, pulseColor) {
      let col = enabled ? "#cf9a3a" : "#4a4438";
      if (btn.pulse > 0) col = pulseColor;
      ctx.save();
      ctx.globalAlpha = btn.pulse > 0 ? .7 : .5;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = .58;
      ctx.strokeStyle = "#1a1108";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = .82;
      ctx.fillStyle = enabled ? "#2a1d08" : "#d0bea0";
      ctx.font = "bold 10px Georgia";
      ctx.textAlign = "center";
      ctx.fillText(label, btn.x, btn.y + 4);
      ctx.restore();
    }
    drawStick(joy, "#5b87a0", "MOVE");
    drawStick(aimJoy, "#a06c45", "AIM/FIRE");
    drawRoundButton(interactBtn, ctxAct ? ctxAct.label : "USE", !!ctxAct, "#7acf3a");
    if (ctxAct && (ctxAct.type === "rebuild" || ctxAct.type === "revive") && interactBtn.pressed && interactBtn.holdAction) {
      const pct = ctxAct.type === "revive" ? Math.max(0, Math.min(1, ((ctxAct.target && ctxAct.target.reviveT) || 0) / REVIVE_DURATION)) : Math.max(0, Math.min(1, interactBtn.holdT / interactBtn.holdNeed));
      ctx.strokeStyle = "#b9ff8a";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(interactBtn.x, interactBtn.y, interactBtn.r + 7, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
      ctx.stroke();
    }
    const canGrenade = player && !player.packingWeapon && !player.turningPower && (player.downedT || 0) <= 0 && (player.grenades || 0) > 0;
    drawRoundButton(grenadeBtn, "NADE", canGrenade, "#f0d45c");
    const canReload = player && !player.packingWeapon && !player.perkDrink && !player.turningPower && !currentSlotPacking() && !player.reloading && player.mag < weaponMagSize(player.weapon, player.packed) && player.reserve > 0;
    drawRoundButton(reloadBtn, "RELOAD", canReload, "#7acf3a");
    return;
    ctx.fillStyle = "rgba(60,80,90,0.4)";
    ctx.beginPath();
    ctx.arc(joy.baseX, joy.baseY, 55, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(180,200,220,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(joy.baseX, joy.baseY, 55, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "rgba(180,200,220,0.5)";
    for (let i = 0; i < 4; i++) {
      const a = i * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(joy.baseX + Math.cos(a) * 44, joy.baseY + Math.sin(a) * 44);
      ctx.lineTo(joy.baseX + Math.cos(a) * 36 - Math.sin(a) * 4, joy.baseY + Math.sin(a) * 36 + Math.cos(a) * 4);
      ctx.lineTo(joy.baseX + Math.cos(a) * 36 + Math.sin(a) * 4, joy.baseY + Math.sin(a) * 36 - Math.cos(a) * 4);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = "#5b87a0";
    ctx.beginPath();
    ctx.arc(joy.x, joy.y, 28, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#243845";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(joy.x, joy.y, 28, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "#243845";
    for (let i = 0; i < 4; i++) {
      const a = i * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(joy.x + Math.cos(a) * 8, joy.y + Math.sin(a) * 8, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }
    const canFire = player && !player.packingWeapon && !currentSlotPacking() && !player.reloading && player.mag > 0;
    const usable = !!ctxAct || canFire;
    let col = "#4a4438";
    if (usable) col = "#cf9a3a";
    if (actBtn.pulse > 0) col = "#7acf3a";
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(actBtn.x, actBtn.y, actBtn.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#1a1108";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(actBtn.x, actBtn.y, actBtn.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = usable ? "#2a1d08" : "#9a8a70";
    ctx.font = "bold 11px Georgia";
    ctx.textAlign = "center";
    const label = ctxAct ? ctxAct.label : "FIRE";
    ctx.fillText(label, actBtn.x, actBtn.y + 4);
  }
  function drawTitlePanel(ctx, x, y, w, h, title, accent) {
    ctx.save();
    ctx.fillStyle = "rgba(15,12,10,0.72)";
    ctx.strokeStyle = accent || "rgba(216,195,154,0.45)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 12);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "rgba(50,37,28,0.62)";
    ctx.beginPath();
    ctx.roundRect(x + 8, y + 8, w - 16, 21, 7);
    ctx.fill();
    ctx.fillStyle = accent || "#e8d9b0";
    ctx.font = "bold 12px Georgia";
    ctx.textAlign = "left";
    ctx.fillText(title, x + 16, y + 23);
    ctx.restore();
  }
  function drawTitlePerkList(x, y, w, h) {
    drawTitlePanel(ctx, x, y, w, h, "PERKS", "#ffd97a");
    const ids = PERK_HUD_ORDER.filter(id => PERKS[id]);
    const compact = w < 168;
    const icon = Math.max(17, Math.min(compact ? 21 : 25, (h - 44) / ids.length - 2));
    const step = Math.max(compact ? 25 : 28, Math.min(compact ? 33 : 37, (h - 46) / ids.length));
    const iconX = x + (compact ? 21 : 25);
    const textX = x + (compact ? 36 : 43);
    let py = y + 45;
    for (const id of ids) {
      const perk = PERKS[id];
      drawPerkIcon(ctx, id, iconX, py, icon, true);
      ctx.fillStyle = "#e8d9b0";
      ctx.font = compact ? "bold 9px Georgia" : "bold 10px Georgia";
      ctx.textAlign = "left";
      ctx.fillText(perk.short, textX, py + (compact ? 3 : -2));
      if (!compact) {
        ctx.fillStyle = "rgba(168,152,120,0.92)";
        ctx.font = "9px Georgia";
        ctx.fillText(perk.name, textX, py + 10);
      }
      py += step;
    }
  }
  function weaponCatalogCount() {
    return Object.keys(WEAPONS || {}).filter(id => WEAPONS[id] && id !== "upgradedPistol").length;
  }
  function drawTitleGunTab(x, y, w, h) {
    drawTitlePanel(ctx, x, y, w, h, "GUNS", "#d6b7ff");
    const count = weaponCatalogCount();
    ctx.save();
    ctx.fillStyle = "rgba(34,27,22,0.68)";
    ctx.strokeStyle = "rgba(214,183,255,0.42)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(x + 10, y + 36, w - 20, h - 46, 9);
    ctx.fill();
    ctx.stroke();
    ctx.textAlign = "center";
    ctx.fillStyle = "#f0e4ff";
    ctx.font = "bold 24px Georgia";
    ctx.fillText(String(count), x + w / 2, y + h - 22);
    ctx.fillStyle = "rgba(214,183,255,0.9)";
    ctx.font = "bold 9px Georgia";
    ctx.fillText("TOTAL WEAPONS", x + w / 2, y + h - 8);
    ctx.restore();
  }
  function drawTitleSpecialModel(kind, x, y, w, h) {
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2 - 8);
    const modelScale = Math.min(1, Math.max(.68, Math.min(w / 82, h / 62)));
    ctx.scale(modelScale, modelScale);
    if (kind === "pack") {
      drawPackMachine(ctx, { x: 0, y: 0, w: 48, h: 68, pulse: performance.now() * .003, processingT: 0 }, false);
    } else if (kind === "box") {
      drawMysteryBox(ctx, { x: 0, y: 4, w: 56, h: 38, pulse: performance.now() * .003, prizeReady: false, displayPrize: null, prize: null, rollT: 0 }, false);
    } else if (kind === "hydrator") {
      ctx.rotate(-.08);
      drawGunShape(ctx, "hydrator", { scale: .74, wall: true, reloadPhase: 0 });
      ctx.fillStyle = "rgba(125,220,235,0.18)";
      ctx.beginPath();
      ctx.ellipse(2, 13, 34, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (kind === "shield") {
      drawShieldComponent(ctx, "plate", -7, 0, 1.08, .96, true);
      drawShieldComponent(ctx, "window", 7, -5, .82, .96, true);
      drawShieldComponent(ctx, "frame", 0, 2, 1.14, .58, true);
    } else if (kind === "power") {
      drawPowerBox(ctx, { x: 0, y: 0, w: 32, h: 42 }, false);
      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = "rgba(255,225,120,0.75)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-14, 23);
      ctx.lineTo(14, 23);
      ctx.stroke();
    }
    ctx.restore();
  }
  function drawTitleSpecials(x, y, w, h) {
    drawTitlePanel(ctx, x, y, w, h, "SPECIALS", "#9fe7ff");
    const items = [
      { kind: "pack", label: "PACK", sub: "upgrade weapons" },
      { kind: "box", label: "MYSTERY BOX", sub: "random guns" },
      { kind: "hydrator", label: "HYDRATOR", sub: "wonder weapon" },
      { kind: "shield", label: "SHIELD", sub: "buildable armor" },
      { kind: "power", label: "POWER", sub: "turns machines on" }
    ];
    const cols = w > 430 ? 5 : w > 300 ? 3 : 2;
    const rows = Math.ceil(items.length / cols);
    const cellW = (w - 28) / cols;
    const cellH = (h - 48) / rows;
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const col = i % cols;
      const row = Math.floor(i / cols);
      const bx = x + 14 + col * cellW;
      const by = y + 40 + row * cellH;
      ctx.fillStyle = "rgba(34,27,22,0.68)";
      ctx.strokeStyle = "rgba(160,142,110,0.42)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(bx + 3, by + 2, cellW - 8, cellH - 8, 8);
      ctx.fill();
      ctx.stroke();
      drawTitleSpecialModel(item.kind, bx + 4, by + 5, cellW - 10, Math.max(42, cellH - 32));
      ctx.fillStyle = "#e8d9b0";
      ctx.font = "bold 10px Georgia";
      ctx.textAlign = "center";
      ctx.fillText(item.label, bx + cellW / 2, by + cellH - 24);
      ctx.fillStyle = "rgba(168,152,120,0.9)";
      ctx.font = "9px Georgia";
      ctx.fillText(item.sub, bx + cellW / 2, by + cellH - 11);
    }
  }
  function drawTitle() {
    ctx.fillStyle = "rgba(10,8,7,0.86)";
    ctx.fillRect(0, 0, W, H);
    const narrowTitle = W <= 560;
    const rightW = narrowTitle ? Math.min(150, Math.max(124, W * .35)) : Math.min(198, Math.max(156, W * .22));
    const sidePad = narrowTitle ? 10 : 18;
    const titleX = W > 720 ? W / 2 : narrowTitle ? Math.max(92, (W - rightW - sidePad) / 2) : W / 2;
    ctx.textAlign = "center";
    ctx.fillStyle = "#e8d9b0";
    ctx.font = narrowTitle ? "bold 28px Georgia" : "bold 40px Georgia";
    ctx.fillText("BURIED TOGETHER", titleX, H / 2 - 112);
    ctx.font = narrowTitle ? "bold 18px Georgia" : "bold 24px Georgia";
    ctx.fillText("v.2", titleX, H / 2 - 73);
    ctx.font = "13px Georgia";
    ctx.fillStyle = "#a89878";
    ctx.fillText("How long can you hold the line?", titleX, H / 2 - 36);
    ctx.fillStyle = "rgba(28,20,14,0.72)";
    ctx.strokeStyle = "rgba(255,217,122,0.35)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(titleX - 116, H / 2 - 6, 232, 54, 10);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#ffd97a";
    ctx.font = narrowTitle ? "bold 13px Georgia" : "bold 15px Georgia";
    ctx.fillText("PERSONAL BEST  ROUND " + String(bestRound).padStart(2, "0"), titleX, H / 2 + 16);
    ctx.fillStyle = globalRecordStatus === "saving" ? "#9fe7ff" : "#e8d9b0";
    const globalLabel = "GLOBAL BEST    ROUND " + String(Math.max(DEFAULT_GLOBAL_BEST_ROUND, globalBestRound || 0)).padStart(2, "0");
    ctx.fillText(globalLabel, titleX, H / 2 + 36);
    const gunTabH = narrowTitle ? 62 : 66;
    let perkH = narrowTitle ? Math.min(Math.max(225, H - 490), 315) : Math.min(H - 56, 340);
    const perkY = narrowTitle ? 14 : Math.max(14, (H - perkH) / 2 - 8);
    if (H > 430) perkH = Math.min(perkH, Math.max(180, H - perkY - gunTabH - 24));
    const rightX = W - rightW - sidePad;
    if (H > 360) drawTitlePerkList(rightX, perkY, rightW, perkH);
    if (H > 430) drawTitleGunTab(rightX, Math.min(H - gunTabH - 14, perkY + perkH + 10), rightW, gunTabH);
    const specialsW = W > 720 ? Math.min(485, W - rightW - 86) : Math.min(W - 44, 410);
    const specialsH = W > 720 ? 124 : 176;
    const specialsX = W > 720 ? 30 : (W - specialsW) / 2;
    const specialsY = Math.min(H - specialsH - 18, H / 2 + 66);
    if (H > 430) drawTitleSpecials(specialsX, specialsY, specialsW, specialsH);
    ctx.font = "italic 16px Georgia";
    ctx.fillStyle = "#e8d9b0";
    const t = (Math.sin(performance.now() * .005) + 1) * .5;
    ctx.globalAlpha = .5 + .5 * t;
    const promptY = H > 430 ? Math.min(H - 34, specialsY - 14) : Math.min(H - 34, H / 2 + 82);
    ctx.fillText(coOp.role === "host" ? (coOp.connected ? "Use Start Game above" : "Waiting for Player 2") : coOp.role === "guest" ? "Waiting for host" : "Tap to begin", titleX, promptY);
    ctx.globalAlpha = 1;
  }
  function drawCountdown() {
    ctx.fillStyle = "rgba(10,8,7,0.82)";
    ctx.fillRect(0, 0, W, H);
    const left = Math.max(0, coOp.countdownEnd - Date.now());
    const count = Math.max(1, Math.ceil(left / 1000));
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd97a";
    ctx.font = "bold 56px Georgia";
    ctx.fillText(String(count), W / 2, H / 2 - 6);
    ctx.fillStyle = "#e8d9b0";
    ctx.font = "bold 18px Georgia";
    ctx.fillText("Co-op survival begins together", W / 2, H / 2 + 38);
  }
  function drawGameOver() {
    ctx.fillStyle = "rgba(20,5,5,0.82)";
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#c83030";
    ctx.font = "bold 36px Georgia";
    ctx.fillText("YOU DIED", W / 2, H / 2 - 60);
    ctx.fillStyle = "#e8d9b0";
    ctx.font = "14px Georgia";
    ctx.fillText("Survived to round " + String(round).padStart(2, "0"), W / 2, H / 2 - 20);
    if (player2) {
      ctx.fillStyle = PLAYER_ONE_COLOR;
      ctx.fillText("P1 score  " + actorPoints(playerOne || player), W / 2, H / 2 + 4);
      ctx.fillStyle = PLAYER_TWO_COLOR;
      ctx.fillText("P2 score  " + actorPoints(player2), W / 2, H / 2 + 28);

      ctx.fillText("Final score  " + score, W / 2, H / 2 + 4);

    ctx.fillStyle = "#ffd97a";
    ctx.fillText("Personal best  ROUND " + String(bestRound).padStart(2, "0"), W / 2, H / 2 + (player2 ? 56 : 32));
    ctx.fillStyle = "#e8d9b0";
    ctx.fillText("Global best    ROUND " + String(Math.max(DEFAULT_GLOBAL_BEST_ROUND, globalBestRound || 0)).padStart(2, "0"), W / 2, H / 2 + (player2 ? 80 : 56));
    if (hostCanRestartRun()) {
      const rect = restartButtonRect();
      const t = (Math.sin(performance.now() * .006) + 1) * .5;
      ctx.save();
      ctx.shadowColor = "rgba(255,217,122,0.28)";
      ctx.shadowBlur = 10 + t * 8;
      ctx.fillStyle = restartBtn.pressed ? "#b77d2f" : "#cf9a3a";
      ctx.strokeStyle = "rgba(255,217,122,0.72)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#231607";
      ctx.font = "bold 16px Georgia";
      ctx.fillText("RESTART RUN", W / 2, rect.y + 30);
      ctx.restore();
    } else {
      ctx.font = "italic 14px Georgia";
      ctx.fillStyle = "#e8d9b0";
      const t = (Math.sin(performance.now() * .005) + 1) * .5;
      ctx.globalAlpha = .5 + .5 * t;
      const prompt = player2 && coOp.role === "guest" ? "Waiting for host to restart" : player2 && coOp.role === "host" ? "Reconnect Player 2 to restart" : "Tap to return to title";
      ctx.fillText(prompt, W / 2, H / 2 + (player2 ? 112 : 80));
      ctx.globalAlpha = 1;
    }
  }
  initGame();
  gameState = "title";
  initGlobalRecord();
  if (!signalReadyFlag) {
    signalReadyFlag = true;
    postMsg({
      type: "gameReady"
    });
  }
  let lastT = performance.now();
  function loop(now) {
    if (!__assetsReady) {
      lastT = now;
      requestAnimationFrame(loop);
      return;
    }
    try {
      const dt = Math.min(.05, (now - lastT) / 1e3);
      lastT = now;
      update(dt);
      render();
    } catch (e) {
      console.error(e);
    } finally {
      if (coOp.role === "host") sendHostZombieSync(false);
      if (coOp.role === "host") sendHostState(false);
      requestAnimationFrame(loop);
    }
  }
  requestAnimationFrame(loop);
})();</script>
